<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Дариға ❤️</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="background"></div>

<div class="container">

<div class="language">

<button class="lang active">РУС</button>

<button class="lang">ҚАЗ</button>

</div>

<div id="page1" class="card active">

<div class="cat">
🐱
</div>

<h3 class="small">
Бекзат ❤️
</h3>

<h1>

Дариға,

<br><br>

ты пойдёшь со мной

<br>

на свидание?

</h1>

<button id="yesBtn" class="mainButton">
Да! 💖
</button>

<button id="noBtn" class="ghostButton">
Нет(
</button>

<p class="hint">

(кнопку "Нет" лучше не нажимать 😼)

</p>

</div>

<div id="page2" class="card">

<div class="cat">
😎
</div>

<h1>

Как поедем?

</h1>

<button class="option" id="taxi">

Закажу Комфорт+

</button>

<button class="option correct">

Сам заеду за тобой 🚗

</button>

<button class="option">

Пойдём пешком 🤝

</button>

</div>

<div id="page3" class="card">

<div class="cat">

😋

</div>

<h1>

Что будем кушать?

</h1>

<div class="foods">

<button class="food">🍣 Суши</button>

<button class="food">🍕 Итальянская</button>

<button class="food">🥩 Мясо</button>

<button class="food">🍰 Десерты</button>

</div>

</div>

<div id="page4" class="card">

<div class="cat">
🤔
</div>

<h1>

Кто платит?

</h1>

<button id="mePay">

Ну я...

</button>

<button class="correct">

Конечно, ты ❤️

</button>

</div>

<div id="page5" class="card">

<div class="cat">
🥹
</div>

<h1>

Насколько сильно ждёшь

нашу встречу?

</h1>

<div id="percent">

0%

</div>

<input
type="range"
min="0"
max="100"
value="0"
id="slider">

</div>

<div id="finish" class="card">

<h1>

❤️

</h1>

<h2>

Спасибо, Дариға 🥹

</h2>

<p>

Тогда встречаемся

<b>в Демалыс күні</b>

</p>

<h3>

С любовью,

<br>

Бекзат ❤️

</h3>

</div>

</div>

<script src="script.js"></script>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">🎵</button></body>
</html>
